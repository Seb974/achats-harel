api_platform:
    title: AH-CHOU - Achats
    version: 4.0.5
    use_symfony_listeners: true
    description: |
        This is a demo application of the [API Platform](https://api-platform.com) framework.
        [Its source code](https://github.com/api-platform/demo) includes various examples, check it out!
        You may also be interested by [the GraphQL entrypoint](/graphql).
        [A PWA](/) and [an admin](/admin) are consuming this API.
    # Mercure integration, remove if unwanted
    mercure:
        include_type: true
    graphql:
        graphql_playground: false
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
        multipart: ['multipart/form-data']
    docs_formats:
        jsonld: ['application/ld+json']
        jsonopenapi: ['application/vnd.openapi+json']
        html: ['text/html']
    http_cache:
        public: true
    # Good defaults for REST APIs
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        extra_properties:
            standard_put: true
            rfc_7807_compliant_errors: true
    serializer:
        hydra_prefix: true
    oauth:
        enabled: true
        clientId: '%env(OIDC_SWAGGER_CLIENT_ID)%'
        pkce: true
        type: oauth2
        flow: authorizationCode
        tokenUrl: '%env(OIDC_SERVER_URL)%/protocol/openid-connect/token'
        authorizationUrl: '%env(OIDC_SERVER_URL)%/protocol/openid-connect/auth'
        scopes:
            openid: (required) Indicates that the application intends to use OIDC to verify the user's identity
    collection:
        pagination:
            enabled_parameter_name: pagination

services:
    _defaults:
        autowire: false
        autoconfigure: false
        public: false

    # "name" is not a property, it's only a method "getName"
    # Can't apply ApiFilter PHP attribute on method, so declare filter manually
    app.filter.user.admin.name:
        class: 'App\Doctrine\Orm\Filter\NameFilter'
        arguments:
            $managerRegistry: '@doctrine'
            $logger: '@logger'
            $nameConverter: '@?api_platform.name_converter'
            $properties: { name: 'ipartial' } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.user.email:
        parent: 'api_platform.doctrine.orm.search_filter'
        arguments:
            $properties: { email: 'exact' } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.user.profil:
        parent: 'api_platform.doctrine.orm.exists_filter'
        arguments: [{ profilPilote: ~ }]
        tags: [ 'api_platform.filter' ]

    app.filter.achat.date:
        parent: 'api_platform.doctrine.orm.date_filter'
        arguments:
            $properties: { date: ~ } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.achat.supplier:
        parent: 'api_platform.doctrine.orm.search_filter'
        arguments:
            $properties: { supplier: 'iword_start' } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.achat.status:
        class: 'App\Doctrine\Orm\Filter\StatusCodeOrLabelFilter'
        arguments:
            $managerRegistry: '@doctrine'
            $logger: '@logger'
            $nameConverter: '@?api_platform.name_converter'
            $properties: { status:  ~ } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.currency.intitule:
        class: 'App\Doctrine\Orm\Filter\CodeOrNameFilter'
        arguments:
            $managerRegistry: '@doctrine'
            $logger: '@logger'
            $nameConverter: '@?api_platform.name_converter'
            $properties: { intitule:  ~ } # ]
        tags: [ 'api_platform.filter' ]
    
    app.filter.currency.usable:
        parent: 'api_platform.doctrine.orm.boolean_filter'
        arguments:
            $properties:  {inUse: ~ } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.expense.date:
        parent: 'api_platform.doctrine.orm.date_filter'
        arguments:
            $properties: { date: ~ } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.expense.mode:
        parent: 'api_platform.doctrine.orm.search_filter'
        arguments:
            $properties: { details.mode: 'iword_start' } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.expense.intitule:
        class: 'App\Doctrine\Orm\Filter\BeneficiaireOrLibelleFilter'
        arguments:
            $managerRegistry: '@doctrine'
            $logger: '@logger'
            $nameConverter: '@?api_platform.name_converter'
            $properties: { intitule:  ~ } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.expense.maintenance:
        parent: 'api_platform.doctrine.orm.boolean_filter'
        arguments:
            $properties:  {relatedToMaintenance: ~ } # ]
        tags: [ 'api_platform.filter' ]

    app.filter.expense.entretien:
        parent: 'api_platform.doctrine.orm.exists_filter'
        arguments: [{ entretien: ~ }]
        tags: [ 'api_platform.filter' ]
