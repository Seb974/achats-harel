# Documentation on how to configure the bundle can be found at: https://symfony.com/doc/current/bundles/LiipImagineBundle/basic-usage.html
liip_imagine:
    # valid drivers options include "gd" or "gmagick" or "imagick"
    driver: "imagick"
    
    resolvers:
        default:
            web_path:
                web_root: '%kernel.project_dir%/public'
                cache_prefix: media/cache

    filter_sets:
        cache: ~
        favicon:
            quality: 85
            filters:
                thumbnail: { size: [32, 32], mode: inset }
        apple_touch_icon:
            quality: 90
            filters:
                thumbnail: { size: [180, 180], mode: inset }
        pdf_background:
            quality: 90
            filters:
                thumbnail: { size: [1240, 1754], mode: inset }
        map_icon:
            quality: 90
            filters:
                thumbnail: { size: [32, 32], mode: inset }
        logo:
            quality: 90
            filters:
                thumbnail: { size: [300, 100], mode: inset }
        thanks_image:
            quality: 85
            filters:
                thumbnail: { size: [1920, 1080], mode: outbound }
