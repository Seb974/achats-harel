    environment:
      APP_ENV: prod
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: y4qKkbOmvj6RMCHgAVaTH6tVfXYf5zmI
      APP_SECRET_ID: Gt2cYITO0xV4yl6qS0q8SxZK2eXY8zAu
      APP_SECRET: ${APP_SECRET_ID:-Gt2cYITO0xV4yl6qS0q8SxZK2eXY8zAu}
