      KEYCLOAK_PRODUCTION: "true"
      KEYCLOAK_ADMINISTRATION_PASSWORD: Aeroprakt22
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMINISTRATION_PASSWORD:-Aeroprakt22}
